<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Flow AI — Automate · Engage · Grow</title>
<meta name="description" content="Digital Flow AI builds websites, AI agents, chatbots, and automation systems that help businesses save time, generate more leads, and scale faster.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:    #2563EB;
    --cyan:    #06B6D4;
    --purple:  #7C3AED;
    --indigo:  #1E2B5E;
    --grad:    linear-gradient(135deg, #2563EB 0%, #06B6D4 50%, #7C3AED 100%);
    --grad2:   linear-gradient(135deg, #7C3AED 0%, #2563EB 100%);
    --white:   #ffffff;
    --offwhite:#F8FAFF;
    --glass:   rgba(255,255,255,0.65);
    --glass-b: rgba(255,255,255,0.25);
    --border:  rgba(99,163,255,0.18);
    --text:    #0F172A;
    --muted:   #64748B;
    --radius:  18px;
    --shadow:  0 8px 40px rgba(37,99,235,0.10);
    --shadow-lg: 0 20px 60px rgba(37,99,235,0.18);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; font-size: 16px; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--white);
    color: var(--text);
    overflow-x: hidden;
    line-height: 1.6;
  }
  h1,h2,h3,h4 { font-family: 'Space Grotesk', sans-serif; line-height: 1.2; }

  /* ── UTILITY ─────────────────────────────────────── */
  .container { max-width: 1180px; margin: 0 auto; padding: 0 24px; }
  .grad-text { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .tag { display: inline-flex; align-items: center; gap: 6px; background: rgba(37,99,235,0.08); color: var(--blue); border: 1px solid rgba(37,99,235,0.18); border-radius: 100px; padding: 5px 16px; font-size: .78rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--grad); color: #fff; border: none; border-radius: 100px;
    padding: 14px 32px; font-size: .95rem; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 24px rgba(37,99,235,0.35);
    transition: transform .2s, box-shadow .2s; text-decoration: none;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(37,99,235,0.45); }
  .btn-outline {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; color: var(--blue);
    border: 2px solid rgba(37,99,235,0.35); border-radius: 100px;
    padding: 13px 30px; font-size: .95rem; font-weight: 700; cursor: pointer;
    transition: all .2s; text-decoration: none;
  }
  .btn-outline:hover { background: rgba(37,99,235,0.06); border-color: var(--blue); }

  .glass-card {
    background: var(--glass);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  /* ── NAV ─────────────────────────────────────────── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 14px 0;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    transition: box-shadow .3s;
  }
  nav.scrolled { box-shadow: 0 4px 24px rgba(37,99,235,0.10); }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo img { height: 44px; width: 44px; border-radius: 10px; object-fit: contain; }
  .nav-logo span { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.1rem; }
  .nav-logo .flow { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .nav-links { display: flex; align-items: center; gap: 28px; list-style: none; }
  .nav-links a { font-size: .88rem; font-weight: 600; color: var(--text); text-decoration: none; transition: color .2s; }
  .nav-links a:hover { color: var(--blue); }
  .nav-cta { display: flex; align-items: center; gap: 12px; }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; border: none; background: none; }
  .hamburger span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: all .3s; }

  /* ── HERO ────────────────────────────────────────── */
  #hero {
    min-height: 100vh;
    display: flex; align-items: center;
    position: relative; overflow: hidden;
    padding: 120px 0 80px;
    background: radial-gradient(ellipse 80% 60% at 60% 30%, rgba(6,182,212,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 10% 80%, rgba(124,58,237,0.07) 0%, transparent 70%),
                var(--offwhite);
  }
  .hero-bg-grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
  }
  .hero-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; position: relative; }
  .hero-badge { margin-bottom: 20px; }
  .hero-h1 { font-size: clamp(2.4rem, 5vw, 3.8rem); font-weight: 900; margin-bottom: 20px; }
  .hero-sub { font-size: 1.1rem; color: var(--muted); max-width: 500px; margin-bottom: 36px; line-height: 1.7; }
  .hero-btns { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 48px; }
  .trust-pills { display: flex; flex-wrap: wrap; gap: 10px; }
  .trust-pill {
    display: flex; align-items: center; gap: 8px;
    background: white; border: 1px solid var(--border);
    border-radius: 100px; padding: 8px 16px; font-size: .82rem; font-weight: 600; color: var(--indigo);
    box-shadow: 0 2px 12px rgba(37,99,235,0.06);
  }
  .trust-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--grad); }

  /* Hero visual */
  .hero-visual { position: relative; display: flex; justify-content: center; align-items: center; }
  .hero-orb {
    position: absolute;
    width: 380px; height: 380px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(6,182,212,0.15) 0%, rgba(37,99,235,0.10) 50%, transparent 70%);
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: .8; } 50% { transform: scale(1.08); opacity: 1; } }
  .hero-logo-wrap {
    position: relative; z-index: 2;
    width: 280px; height: 280px;
    background: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 1px var(--border), 0 20px 80px rgba(37,99,235,0.20);
  }
  .hero-logo-wrap img { width: 220px; height: 220px; object-fit: contain; }

  /* Floating stat cards */
  .float-card {
    position: absolute; z-index: 3;
    background: white; border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 18px;
    box-shadow: 0 8px 30px rgba(37,99,235,0.12);
    animation: floatY 3s ease-in-out infinite;
  }
  .float-card:nth-child(2) { animation-delay: -1s; top: 20px; right: -20px; }
  .float-card:nth-child(3) { animation-delay: -2s; bottom: 30px; left: -30px; }
  @keyframes floatY { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .float-card .fnum { font-size: 1.4rem; font-weight: 800; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .float-card .flabel { font-size: .72rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }

  /* ── SECTION COMMON ──────────────────────────────── */
  section { padding: 96px 0; }
  .section-header { text-align: center; margin-bottom: 64px; }
  .section-header h2 { font-size: clamp(1.9rem, 4vw, 2.8rem); font-weight: 800; margin: 12px 0 16px; }
  .section-header p { font-size: 1.05rem; color: var(--muted); max-width: 580px; margin: 0 auto; }

  /* ── SERVICES ────────────────────────────────────── */
  #services { background: var(--offwhite); }
  .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .service-card {
    background: white; border: 1px solid var(--border);
    border-radius: var(--radius); padding: 32px 28px;
    transition: transform .25s, box-shadow .25s;
    position: relative; overflow: hidden;
  }
  .service-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--grad); opacity: 0; transition: opacity .25s;
  }
  .service-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
  .service-card:hover::before { opacity: 1; }
  .svc-icon {
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg, rgba(37,99,235,0.10), rgba(6,182,212,0.10));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; margin-bottom: 18px;
    border: 1px solid rgba(37,99,235,0.12);
  }
  .service-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 10px; }
  .service-card p { font-size: .88rem; color: var(--muted); line-height: 1.65; }

  /* ── INDUSTRIES ──────────────────────────────────── */
  #industries { background: white; }
  .industries-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .industry-card {
    background: white; border: 1px solid var(--border); border-radius: var(--radius);
    padding: 28px 22px; cursor: pointer;
    transition: all .25s; position: relative; overflow: hidden;
  }
  .industry-card:hover { border-color: var(--blue); box-shadow: 0 8px 32px rgba(37,99,235,0.12); transform: translateY(-3px); }
  .ind-emoji { font-size: 2rem; margin-bottom: 12px; }
  .industry-card h3 { font-size: .95rem; font-weight: 700; margin-bottom: 14px; }
  .ind-row { margin-bottom: 8px; }
  .ind-row .label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--blue); margin-bottom: 2px; }
  .ind-row p { font-size: .78rem; color: var(--muted); line-height: 1.5; }
  .ind-result { font-size: .78rem; color: #059669; font-weight: 600; }

  /* ── WHY US ──────────────────────────────────────── */
  #why { background: var(--indigo); color: white; position: relative; overflow: hidden; }
  #why::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 60% at 80% 50%, rgba(6,182,212,0.15) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 10% 20%, rgba(124,58,237,0.15) 0%, transparent 70%);
  }
  .why-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; position: relative; }
  .why-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius); padding: 28px 24px;
    transition: background .25s;
  }
  .why-card:hover { background: rgba(255,255,255,0.10); }
  .why-icon { font-size: 1.8rem; margin-bottom: 14px; }
  .why-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
  .why-card p { font-size: .85rem; color: rgba(255,255,255,0.65); line-height: 1.6; }
  #why .section-header { color: white; }
  #why .section-header p { color: rgba(255,255,255,0.65); }

  /* ── HOW WE WORK ─────────────────────────────────── */
  #process { background: var(--offwhite); }
  .process-steps { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; position: relative; }
  .process-steps::before {
    content: ''; position: absolute; top: 36px; left: 10%; right: 10%; height: 2px;
    background: linear-gradient(90deg, var(--blue), var(--cyan), var(--purple));
    z-index: 0;
  }
  .step-card {
    position: relative; z-index: 1; text-align: center; padding: 20px 12px;
    background: white; border: 1px solid var(--border); border-radius: var(--radius);
    transition: box-shadow .25s, transform .25s;
  }
  .step-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-4px); }
  .step-num {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--grad);
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 800; font-size: .95rem; margin: 0 auto 14px;
  }
  .step-card h3 { font-size: .9rem; font-weight: 700; margin-bottom: 8px; }
  .step-card p { font-size: .78rem; color: var(--muted); }

  /* ── N8N WORKFLOWS ───────────────────────────────── */
  #workflows { background: white; }
  .workflows-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .workflow-card {
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; transition: box-shadow .25s, transform .25s;
  }
  .workflow-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); }
  .wf-header { padding: 20px 24px; background: linear-gradient(135deg, var(--indigo), #2563EB); color: white; }
  .wf-header .wf-cat { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; opacity: .7; margin-bottom: 6px; }
  .wf-header h3 { font-size: .97rem; font-weight: 700; }
  .wf-body { padding: 20px 24px; }
  .wf-nodes { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .wf-node {
    display: flex; align-items: center; gap: 5px;
    background: var(--offwhite); border: 1px solid var(--border);
    border-radius: 100px; padding: 4px 12px; font-size: .72rem; font-weight: 600; color: var(--indigo);
  }
  .wf-node .nd { width: 6px; height: 6px; border-radius: 50%; }
  .wf-desc { font-size: .82rem; color: var(--muted); line-height: 1.55; }
  .wf-trigger { font-size: .75rem; color: var(--purple); font-weight: 600; margin-top: 10px; }

  /* ── PORTFOLIO ───────────────────────────────────── */
  #portfolio { background: var(--offwhite); }
  .portfolio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .portfolio-card {
    border-radius: var(--radius); overflow: hidden;
    background: white; border: 1px solid var(--border);
    transition: box-shadow .25s, transform .25s;
  }
  .portfolio-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-4px); }
  .port-thumb {
    height: 180px; display: flex; align-items: center; justify-content: center;
    font-size: 3rem; position: relative; overflow: hidden;
  }
  .port-thumb .port-bg { position: absolute; inset: 0; opacity: .12; }
  .port-thumb .port-emoji { position: relative; z-index: 1; }
  .port-info { padding: 20px 22px; }
  .port-cat { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--blue); margin-bottom: 6px; }
  .port-info h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
  .port-info p { font-size: .82rem; color: var(--muted); }
  .port-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .port-tag { background: var(--offwhite); border: 1px solid var(--border); border-radius: 100px; padding: 3px 10px; font-size: .7rem; font-weight: 600; color: var(--indigo); }

  /* ── CASE STUDIES ────────────────────────────────── */
  #results { background: var(--indigo); color: white; position: relative; overflow: hidden; }
  #results::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 60% at 90% 40%, rgba(6,182,212,0.12), transparent);
  }
  .results-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; position: relative; margin-bottom: 60px; }
  .result-card {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius); padding: 28px 22px; text-align: center;
  }
  .result-num { font-size: 2.4rem; font-weight: 900; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .result-label { font-size: .85rem; color: rgba(255,255,255,0.65); margin-top: 6px; }
  .cases-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; position: relative; }
  .case-card {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius); padding: 28px 26px;
  }
  .case-industry { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--cyan); margin-bottom: 10px; }
  .case-card h3 { font-size: 1.02rem; font-weight: 700; margin-bottom: 10px; }
  .case-card p { font-size: .85rem; color: rgba(255,255,255,0.65); line-height: 1.6; margin-bottom: 14px; }
  .case-metrics { display: flex; gap: 20px; flex-wrap: wrap; }
  .case-metric .val { font-size: 1.3rem; font-weight: 800; color: var(--cyan); }
  .case-metric .lbl { font-size: .72rem; color: rgba(255,255,255,0.55); }
  #results .section-header { color: white; }
  #results .section-header p { color: rgba(255,255,255,0.65); }

  /* ── TESTIMONIALS ────────────────────────────────── */
  #testimonials { background: var(--offwhite); }
  .testi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .testi-card {
    background: white; border: 1px solid var(--border); border-radius: var(--radius);
    padding: 28px 26px; transition: box-shadow .25s;
  }
  .testi-card:hover { box-shadow: var(--shadow-lg); }
  .stars { color: #F59E0B; font-size: 1rem; margin-bottom: 14px; letter-spacing: 2px; }
  .testi-quote { font-size: .92rem; color: var(--text); line-height: 1.7; margin-bottom: 20px; font-style: italic; }
  .testi-author { display: flex; align-items: center; gap: 12px; }
  .testi-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; color: white; flex-shrink: 0; }
  .testi-name { font-weight: 700; font-size: .9rem; }
  .testi-role { font-size: .78rem; color: var(--muted); }

  /* ── FAQ ─────────────────────────────────────────── */
  #faq { background: white; }
  .faq-list { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
  .faq-item {
    background: var(--offwhite); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
  }
  .faq-q {
    width: 100%; text-align: left; padding: 20px 24px;
    background: none; border: none; cursor: pointer;
    font-family: 'Space Grotesk', sans-serif; font-size: .97rem; font-weight: 700;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .faq-q .chevron { font-size: .8rem; transition: transform .3s; flex-shrink: 0; }
  .faq-q.open .chevron { transform: rotate(180deg); }
  .faq-a { max-height: 0; overflow: hidden; transition: max-height .4s ease; }
  .faq-a.open { max-height: 300px; }
  .faq-a p { padding: 0 24px 20px; font-size: .88rem; color: var(--muted); line-height: 1.7; }

  /* ── CONTACT ─────────────────────────────────────── */
  #contact { background: var(--offwhite); }
  .contact-wrap { display: grid; grid-template-columns: 1fr 1.2fr; gap: 60px; align-items: start; }
  .contact-left h2 { font-size: clamp(1.7rem, 3vw, 2.4rem); font-weight: 800; margin-bottom: 16px; }
  .contact-left p { color: var(--muted); font-size: .97rem; line-height: 1.7; margin-bottom: 32px; }
  .contact-feature { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; font-size: .9rem; font-weight: 600; }
  .contact-feature .cf-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--grad); display: flex; align-items: center; justify-content: center; font-size: .9rem; flex-shrink: 0; }
  .contact-form {
    background: white; border: 1px solid var(--border); border-radius: var(--radius);
    padding: 36px 32px; box
